<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ICT Pokrytí">

<title>ICT Pokrytí · T-Mobile Business</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --magenta: #E20074;
    --magenta-light: #fce8f3;
    --magenta-dark: #9B004E;
    --navy: #0D2D6B;
    --navy-light: #eef3fb;
    --bg: #f5f5f7;
    --surface: #ffffff;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #aaaaaa;
    --green: #1a6b2e;
    --green-bg: #e6f4ea;
  }

  body {
    font-family: 'Figtree', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
  }

  /* TOPBAR */
  .topbar {
    background: var(--magenta);
    color: #fff;
    padding: 52px 16px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .topbar-sub { font-size: 11px; opacity: 0.75; margin-top: 2px; }

  /* SEARCH */
  .search-section {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    position: sticky;
    top: 82px;
    z-index: 99;
  }
  .search-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .tab {
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .search-row { display: flex; gap: 8px; position: relative; }
  .search-row input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 15px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-row input:focus { border-color: var(--magenta); }
  .search-row button {
    background: var(--magenta);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
  }

  /* DROPDOWN */
  .dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 56px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    z-index: 200;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    display: none;
  }
  .dd-item {
    padding: 11px 14px;
    border-bottom: 1px solid var(--bg);
    cursor: pointer;
    transition: background 0.1s;
  }
  .dd-item:last-child { border-bottom: none; }
  .dd-item:active { background: var(--bg); }
  .dd-name { font-size: 14px; font-weight: 500; }
  .dd-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  /* COMPANY INFO */
  .company-card {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
    display: none;
  }
  .company-name {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .company-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .pills { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; }
  .pill {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
  }
  .pill-fa { background: var(--navy-light); color: var(--navy); }
  .pill-meet { background: #f0f0f0; color: #555; }
  .pill-sim { background: var(--green-bg); color: var(--green); }

  /* LEGEND */
  .legend {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 7px 16px;
    display: none;
    gap: 12px;
    align-items: center;
  }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); }
  .leg-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .leg-has { background: var(--magenta-light); border: 1.5px solid var(--magenta); }
  .leg-offer { background: var(--navy-light); border: 1.5px solid var(--navy); }
  .leg-none { background: #fff; border: 1px solid var(--border); }

  /* GRID */
  .grid-wrap { padding: 12px 12px 100px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    min-height: 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 6px 8px;
    cursor: pointer;
    text-align: center;
    transition: transform 0.1s, border-color 0.12s, background 0.12s;
    user-select: none;
    -webkit-user-select: none;
  }
  .tile:active { transform: scale(0.95); }
  .tile.has {
    background: var(--magenta-light);
    border: 2px solid var(--magenta);
    cursor: default;
  }
  .tile.offered {
    background: var(--navy-light);
    border: 2px solid var(--navy);
  }
  .tile.soon {
    background: #fafafa;
    border: 1px dashed var(--border);
    cursor: default;
  }
  .tile.soon:active { transform: none; }
  .tile-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-secondary);
    line-height: 1.3;
    letter-spacing: 0.01em;
  }
  .tile.has .tile-label { color: var(--magenta-dark); }
  .tile.offered .tile-label { color: var(--navy); }
  .tile.soon .tile-label { color: var(--text-tertiary); font-size: 9.5px; }
  .tile-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-top: 6px;
    opacity: 0;
  }
  .tile.has .tile-dot { opacity: 1; background: var(--magenta); }
  .tile.offered .tile-dot { opacity: 1; background: var(--navy); }
  .soon-badge {
    font-size: 8px;
    font-weight: 600;
    background: var(--navy);
    color: #fff;
    padding: 2px 7px;
    border-radius: 20px;
    margin-top: 5px;
    letter-spacing: 0.06em;
  }

  /* EMPTY */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 32px;
    text-align: center;
    color: var(--text-tertiary);
    gap: 10px;
  }
  .empty-icon { font-size: 40px; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  /* BOTTOM BAR */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    display: none;
    gap: 8px;
    align-items: center;
    z-index: 100;
  }
  .btn-reset {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .btn-save {
    flex: 1;
    background: var(--magenta);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px 0;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  .badge {
    font-size: 11px;
    color: var(--text-secondary);
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--navy);
    color: #fff;
    padding: 9px 20px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    z-index: 300;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>

const DBmap = {};
DB.forEach(c => DBmap[c.ico] = c);

let mode = 'ico', currentIco = null;
let storage = {};
try { storage = JSON.parse(localStorage.getItem('ict_app') || '{}'); } catch(e) {}

function switchTab(m) {
  mode = m;
  document.getElementById('tab-ico').classList.toggle('active', m === 'ico');
  document.getElementById('tab-name').classList.toggle('active', m === 'name');
  const inp = document.getElementById('search-input');
  inp.value = '';
  inp.placeholder = m === 'ico' ? 'Zadej IČO...' : 'Zadej název firmy...';
  hideDD();
}

function onInput() {
  const val = document.getElementById('search-input').value.trim().toLowerCase();
  if (val.length < 2) { hideDD(); return; }
  let hits = mode === 'name'
    ? DB.filter(c => c.name.toLowerCase().includes(val)).slice(0, 8)
    : DB.filter(c => c.ico.startsWith(val)).slice(0, 6);
  if (hits.length > 1) showDD(hits); else hideDD();
}

function onKey(e) { if (e.key === 'Enter') { hideDD(); doSearch(); } }

function showDD(hits) {
  const dd = document.getElementById('dropdown');
  dd.innerHTML = hits.map(c =>
    `<div class="dd-item" onclick="pick('${c.ico}')">
      <div class="dd-name">${c.name}</div>
      <div class="dd-sub">IČO: ${c.ico}${c.fa > 0 ? ' · ' + c.fa.toLocaleString('cs-CZ') + ' Kč/měs' : ''}</div>
    </div>`).join('');
  dd.style.display = 'block';
}
function hideDD() { document.getElementById('dropdown').style.display = 'none'; }
function pick(ico) { hideDD(); load(ico); }

function doSearch() {
  const val = document.getElementById('search-input').value.trim();
  if (!val) return;
  if (mode === 'ico') {
    if (DBmap[val]) load(val);
  } else {
    const hit = DB.find(c => c.name.toLowerCase().includes(val.toLowerCase()));
    if (hit) load(hit.ico);
  }
}

function load(ico) {
  currentIco = ico;
  const c = DBmap[ico];
  if (!c) return;

  document.getElementById('cname').textContent = c.name;
  document.getElementById('cmeta').textContent = 'IČO: ' + c.ico + ' · ' + c.smlouva;

  const pills = [];
  if (c.fa > 0) pills.push(`<span class="pill pill-fa">${c.fa.toLocaleString('cs-CZ')} Kč/měs</span>`);
  if (c.posl_setkani) pills.push(`<span class="pill pill-meet">Setkání: ${c.posl_setkani}</span>`);
  if (c.sims > 0) pills.push(`<span class="pill pill-sim">${c.sims} SIM</span>`);
  document.getElementById('cpills').innerHTML = pills.join('');

  document.getElementById('company-card').style.display = 'block';
  document.getElementById('legend').style.display = 'flex';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('bottom-bar').style.display = 'flex';

  renderGrid(c);
}

function renderGrid(c) {
  const saved = storage[currentIco] || [];
  const grid = document.getElementById('product-grid');
  grid.style.display = 'grid';

  let html = PRODUCTS.map((p, i) => {
    const has = p.col && c[p.col] > 0;
    const offered = !has && saved.includes(i);
    const cls = has ? 'has' : offered ? 'offered' : '';
    const click = has ? '' : `onclick="toggle(this,${i})"`;
    return `<div class="tile ${cls}" ${click}><div class="tile-label">${p.label}</div><div class="tile-dot"></div></div>`;
  }).join('');
  html += `<div class="tile soon"><div class="tile-label">Připravujeme</div><div class="soon-badge">SOON</div></div>`;
  grid.innerHTML = html;
  updateBadge();
}

function toggle(el, idx) {
  el.classList.toggle('offered');
  updateBadge();
}

function updateBadge() {
  const has = document.querySelectorAll('.tile.has').length;
  const off = document.querySelectorAll('.tile.offered').length;
  document.getElementById('badge').textContent = has + ' má · ' + off + ' nabídnuto';
}

function saveState() {
  if (!currentIco) return;
  storage[currentIco] = Array.from(document.querySelectorAll('.tile:not(.soon):not(.has)')).map((el, i) => {
    const label = el.querySelector('.tile-label').textContent;
    const idx = PRODUCTS.findIndex(p => p.label === label);
    return el.classList.contains('offered') ? idx : null;
  }).filter(v => v !== null);
  try { localStorage.setItem('ict_app', JSON.stringify(storage)); } catch(e) {}
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function resetOffered() {
  document.querySelectorAll('.tile.offered').forEach(t => t.classList.remove('offered'));
  updateBadge();
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-row')) hideDD();
});
</script>
